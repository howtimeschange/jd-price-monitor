# 京东价格监控配置文件

shop:
  # 亚瑟士京东自营店铺 ID
  shop_id: "1000462158"
  shop_url: "https://mall.jd.com/index-1000462158.html"
  shop_name: "ASICS亚瑟士京东自营旗舰店"

monitor:
  # 监控间隔（分钟），默认 120 分钟 = 2小时
  interval_minutes: 120
  # 破价阈值：前台价 / 吊牌价 低于此比例则告警（0.5 = 5折）
  price_ratio_threshold: 0.50
  # 并发抓取数量（建议 3-5，过大容易触发风控）
  concurrency: 3
  # 每个页面加载超时（秒）
  page_timeout_seconds: 30
  # 请求之间随机延迟范围（秒）
  delay_min_seconds: 1
  delay_max_seconds: 3

dingtalk:
  # 钉钉群机器人 Webhook 地址，替换为真实地址
  webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_HERE"
  # 是否启用加签验证（如果机器人开启了加签，填入密钥；否则留空）
  secret: ""
  # 告警时 @的手机号列表（留空则不@任何人）
  at_mobiles: []
  # 是否 @所有人
  at_all: false

output:
  # 历史记录保存目录
  data_dir: "data"
  # 日志目录
  log_dir: "logs"
  # 保留历史记录天数
  keep_days: 30
